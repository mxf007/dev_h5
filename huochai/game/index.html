        function heredoc(fn) {
            return fn.toString().split('\n').slice(1,-1).join('\n') + '\n'

        function sdklogin(serverlist, logincb){
                var dlg=$("#sdkmask");
                if (dlg.length == 0)

                    $("body").append('<div id="sdkmask" style="left:0;top:0;width:100%;height:100%;background:black;position:absolute;z-index:9999;opacity:0.5;display:none;"></div>'); 
                    dlg=$("#sdkmask");

                var dlg=$("#sdkbox");

                var tpl = heredoc(function(){/*
        <div class="loginbox" style="display:none;width:255px;height:36px;background:green;">
        <select id="servername" style="width:200px;height:100%;border:none;border-right:1px solid grey;padding:0  0 0 8px;margin:0;border-radius:4px;"></select><span class="loginbtn" style="width:50px;height:100%; padding:0 0 0 8px;cursor: pointer;margin: 0;">登陆</span>
        </div>
        */});


        var showdlg=function(){
            $("#sdkmask").show();
            $("#sdkbox").show();
            $("#sdkbox .loginbox").show();
            var selItem=document.getElementById("servername");
            accountlist=serverlist;
            for (var key in serverlist) {
                selItem.options.add(new Option(serverlist[key][0], key));
            }
            $("#sdkbox .loginbox #servername").val(localStorage.getItem(loginservername));

        }

        $("#sdkbox").html(tpl);
        showdlg();
        $("#sdkbox .loginbox .loginbtn").click(function(){
            if ($("#sdkbox .loginbox #servername").val()=="")
            {
                return;
            }
            localStorage.setItem(loginservername, $("#sdkbox .loginbox #servername").val());
            $("#sdkmask").hide();
            $("#sdkbox").hide();
            $("#sdkbox .loginbox").hide();
            var accountdata=accountlist[$("#sdkbox .loginbox #servername").val()];
            logincb(accountdata);
        });
      
};

<script>
    var loadScript = function (list, callback) {
        var loaded = 0;
        var loadNext = function () {
            loadSingleScript(list[loaded], function () {
                loaded++;
                // setPreloadProgress(Math.ceil(loaded / list.length * 30), null, 10);
                if (loaded >= list.length) {
                    callback();
                }
                else {
                    loadNext();
                }
            })
        };
        loadNext();
    };

    var loadSingleScript = function (src, callback) {
        var s = document.createElement('script');
        s.async = false;
        s.src = src;
        s.addEventListener('load', function () {
            s.parentNode.removeChild(s);
            s.removeEventListener('load', arguments.callee, false);
            callback();
        }, false);
        document.body.appendChild(s);
    };

    function showShareGuide() {

    function onShareClick() {
        var shareImg = document.getElementById("mask_fenxiang");
        hideShareGuide();
        if (shareCb && shareThis) {
            shareCb.call(shareThis);
        }
        shareImg.removeEventListener('click', onShareClick);
        shareCb = null;
        shareThis = null;
    }

    function hideShareGuide() {

    //游戏上报
    var preLv = 0;
    function pfReport(data) {
        if ((preLv == 0 || preLv != data.level) && data.level > 30) {
            window.IS_NOPAY = false;
            window.IOS_IS_NOPAY = false;

            if (payOpenCB) {
                payOpenCB.call(payOpenThis);
